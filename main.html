<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Assignment 3</title>

    <style>
        table {
            border: 1px solid black;
            border-spacing: 1px;
        }

        td {
            border: 1px solid black;
            padding: 1px;
        }

        .middle {
            margin: 20px auto;
        }

        .center {
            text-align: center;
        }

        .right {
            text-align: right;
        }

        .green {
            background-color: green;
        }

        .blue {
            background-color: blue;
        }
    </style>
</head>
<body>

    <!-- Heading -->
    <h1 style="text-align:center;">HTML Assignment #3</h1>

    <!-- ================= TABLE 1 ================= -->
    <table id="table-1" class="middle">
        <tr>
            <td id="t11">1</td>
            <td id="t12">2</td>
            <td id="t13" class="right">3</td>
        </tr>
        <tr class="center">
            <td>4</td>
            <td>5</td>
            <td class="right">6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
            <td class="right">9</td>
        </tr>
    </table>

    <!-- ================= TABLE 2 ================= -->
    <table id="table-2" class="middle">
        <tr>
            <td id="t21" colspan="6" class="center">This is Table 2 Header</td>
        </tr>
        <tr>
            <td>A</td><td>B</td><td>C</td><td>D</td><td>E</td><td>F</td>
        </tr>
        <tr>
            <td>G</td><td>H</td><td>I</td><td>J</td><td>K</td><td>L</td>
        </tr>
        <tr>
            <td>M</td><td>N</td><td>O</td><td>P</td><td>Q</td><td>R</td>
        </tr>
        <tr>
            <td>S</td><td>T</td><td>U</td><td>V</td><td>W</td><td>X</td>
        </tr>
        <tr>
            <td>Y</td><td>Z</td><td>1</td><td>2</td><td>3</td><td>4</td>
        </tr>
    </table>

    <!-- ================= TABLE 3 ================= -->
    <table id="table-3" class="middle">
        <tr class="green">
            <td>Top Row (Green)</td>
        </tr>
        <tr>
            <td id="t-image">
                <img src="https://via.placeholder.com/150" alt="Sample Image">
            </td>
        </tr>
        <tr class="blue">
            <td>Bottom Row (Blue)</td>
        </tr>
    </table>

</body>
</html>
